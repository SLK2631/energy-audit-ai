<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <!-- Glow filters -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%"><stop offset="0%" stop-color="#1a3a5c" stop-opacity="0.8"/><stop offset="100%" stop-color="#07080f" stop-opacity="0"/></radialGradient>
    <filter id="glow-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-hex" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Flame gradient (blue like reference) -->
    <linearGradient id="flameGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="60%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>

    <!-- Water drop gradient -->
    <linearGradient id="dropGrad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>

    <!-- Bolt gradient -->
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>

    <!-- Hex outer glow -->
    <filter id="hex-outer" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" fill="#0c1020" rx="20"/><rect width="120" height="120" fill="url(#bgGlow)" rx="20" opacity="0.4"/>

  <!-- Corner bracket decorations -->
  <path d="M6,18 L6,6 L18,6" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>
  <path d="M102,6 L114,6 L114,18" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>
  <path d="M6,102 L6,114 L18,114" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>
  <path d="M102,114 L114,114 L114,102" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>

  <!--
    Hexagon: pointed top, center (60,60), radius 43
    Top:           (60,    17)
    Top-right:     (97.2,  38.5)   [60+43*sin60, 60-43*cos60]
    Bottom-right:  (97.2,  81.5)
    Bottom:        (60,    103)
    Bottom-left:   (22.8,  81.5)
    Top-left:      (22.8,  38.5)

    Division lines from center to: top(60,17), bottom-right(97.2,81.5), bottom-left(22.8,81.5)
    → 3 equal sections

    Section centroids (avg of 4 polygon vertices including center):
      Top-right:  ~(78.8, 48.8) → LIGHTNING BOLT
      Bottom:     ~(60,   82.8) → WATER DROP
      Top-left:   ~(41.2, 48.8) → FLAME
  -->

  <!-- Section background fills (very subtle) -->
  <path d="M60,60 L60,17 L97.2,38.5 L97.2,81.5 Z" fill="rgba(0,212,255,0.04)"/>
  <path d="M60,60 L97.2,81.5 L60,103 L22.8,81.5 Z" fill="rgba(56,189,248,0.04)"/>
  <path d="M60,60 L22.8,81.5 L22.8,38.5 L60,17 Z" fill="rgba(14,165,233,0.04)"/>

  <!-- Hex outer ambient glow -->
  <polygon points="60,17 97.2,38.5 97.2,81.5 60,103 22.8,81.5 22.8,38.5"
    fill="none" stroke="#38BDF8" stroke-width="10" opacity="0.15"/>

  <!-- Main hexagon border -->
  <polygon points="60,17 97.2,38.5 97.2,81.5 60,103 22.8,81.5 22.8,38.5"
    fill="none" stroke="#38BDF8" stroke-width="2.2" filter="url(#glow-soft)" opacity="1"/>

  <!-- Inner hex highlight (thinner, brighter) -->
  <polygon points="60,17 97.2,38.5 97.2,81.5 60,103 22.8,81.5 22.8,38.5"
    fill="none" stroke="#67e8f9" stroke-width="0.8" opacity="0.7"/>

  <!-- Division lines (dashed) -->
  <line x1="60" y1="60" x2="60" y2="17"
    stroke="#22d3ee" stroke-width="1.1" opacity="0.6" stroke-dasharray="4,3"/>
  <line x1="60" y1="60" x2="97.2" y2="81.5"
    stroke="#22d3ee" stroke-width="1.1" opacity="0.6" stroke-dasharray="4,3"/>
  <line x1="60" y1="60" x2="22.8" y2="81.5"
    stroke="#22d3ee" stroke-width="1.1" opacity="0.6" stroke-dasharray="4,3"/>

  <!-- Glowing nodes at the 3 division vertices -->
  <circle cx="60"   cy="17"   r="4" fill="#00d4ff" filter="url(#glow-strong)" opacity="0.95"/>
  <circle cx="97.2" cy="81.5" r="4" fill="#00d4ff" filter="url(#glow-strong)" opacity="0.95"/>
  <circle cx="22.8" cy="81.5" r="4" fill="#00d4ff" filter="url(#glow-strong)" opacity="0.95"/>

  <!-- Smaller nodes at other 3 vertices -->
  <circle cx="97.2" cy="38.5" r="2.2" fill="#38BDF8" opacity="0.65" filter="url(#glow-soft)"/>
  <circle cx="22.8" cy="38.5" r="2.2" fill="#38BDF8" opacity="0.65" filter="url(#glow-soft)"/>
  <circle cx="60"   cy="103"  r="2.2" fill="#38BDF8" opacity="0.65" filter="url(#glow-soft)"/>

  <!-- Center node -->
  <circle cx="60" cy="60" r="2.8" fill="#67e8f9" filter="url(#glow-strong)" opacity="0.9"/>

  <!-- ══════════════════════════════════════════════
       ⚡ LIGHTNING BOLT — top-right section (~79, 49)
       ══════════════════════════════════════════════ -->
  <!-- Bold angular bolt, centered around (79, 49) -->
  <path d="M83.5,37 L73,51.5 L79.5,51.5 L74.5,63 L86,47 L79,47 Z"
    fill="url(#boltGrad)" filter="url(#glow-soft)" opacity="0.97"/>

  <!-- ══════════════════════════════════════════════
       💧 WATER DROP — bottom section (~60, 83)
       ══════════════════════════════════════════════ -->
  <!-- Clean teardrop: point top, round bottom -->
  <path d="M60,71.5
    C60,71.5 50.5,80 50.5,86.5
    C50.5,92.5 54.7,97.5 60,97.5
    C65.3,97.5 69.5,92.5 69.5,86.5
    C69.5,80 60,71.5 60,71.5 Z"
    fill="url(#dropGrad)" filter="url(#glow-soft)" opacity="0.93"/>
  <!-- Highlight bubble -->
  <ellipse cx="56.5" cy="83.5" rx="3" ry="4" fill="rgba(255,255,255,0.3)" opacity="0.8"/>

  <!-- ══════════════════════════════════════════════
       🔥 GAS FLAME — top-left section (~41, 49)
       ══════════════════════════════════════════════ -->
  <!-- Outer flame body: elegant tall shape with curl at top -->
  <path d="M41,36.5
    C39.5,40 35.5,45.5 35.5,52
    C35.5,58.5 38,63 41,64.5
    C44,63 46.5,58.5 46.5,52
    C46.5,48 44.5,44 43.5,40.5
    C43.5,40.5 45.5,45 45.5,50
    C45.5,54 43.5,57.5 41,59
    C38.5,57.5 36.5,54 36.5,50
    C36.5,44.5 41,36.5 41,36.5 Z"
    fill="url(#flameGrad)" filter="url(#glow-soft)" opacity="0.95"/>
  <!-- Inner flame teardrop (lighter, gives depth) -->
  <path d="M41,47
    C40,49.5 38.5,52 38.5,54.5
    C38.5,57.5 39.5,59.5 41,60.5
    C42.5,59.5 43.5,57.5 43.5,54.5
    C43.5,52 42,49.5 41,47 Z"
    fill="rgba(255,255,255,0.22)"/>
  <!-- Top of flame --> 
</svg>
